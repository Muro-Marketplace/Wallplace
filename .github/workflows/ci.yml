name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch. Saves minutes on PR churn.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: website

jobs:
  # ─── Fast gate: lint + typecheck + unit tests. Runs on every PR/push. ───
  check:
    name: lint + typecheck + unit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Dummy values let the build + env.ts parse succeed without any real
      # infra. Tests that need specific env set it themselves.
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOi_PLACEHOLDER_CI_ANON_KEY
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOi_PLACEHOLDER_CI_SVC_KEY
      NEXT_PUBLIC_SITE_URL: https://wallplace.co.uk

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - run: npm ci
      # Lint surfaces pre-existing React Compiler warnings — informational
      # only until the backlog is cleared. Flip to blocking once green.
      - name: Lint (informational)
        run: npm run lint
        continue-on-error: true
      - run: npm run typecheck
      - run: npm run test

  # ─── Build + Playwright smoke. Runs on main + PRs. ───
  e2e:
    name: build + playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: check
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOi_PLACEHOLDER_CI_ANON_KEY
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOi_PLACEHOLDER_CI_SVC_KEY
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      # src/lib/stripe.ts instantiates `new Stripe(...)` at module load,
      # so the build-time data-collection pass for /api/checkout (and
      # any route that imports it) needs *some* value here. The
      # placeholder never makes a real API call — Stripe only validates
      # the key when an actual request is dispatched.
      STRIPE_SECRET_KEY: sk_test_PLACEHOLDER_CI_KEY
      CI: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: website/playwright-report/
          retention-days: 7
